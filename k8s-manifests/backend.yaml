apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: demo-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
      - name: api
        image: docker.io/larbizyoisco/backend-api:sha-e2aa7d4
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: demo-apps
spec:
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: backend-api
