apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-web
  namespace: demo-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-web
  template:
    metadata:
      labels:
        app: frontend-web
    spec:
      containers:
      - name: frontend
        image: docker.io/larbizyoisco/frontend-web:sha-8dd3b7f
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: API_URL
          value: "http://114.119.173.132:30085" # K8s internal DNS (change to external ingress URL if testing outside the cluster)
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-web
  namespace: demo-apps
spec:
  type: NodePort
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30030 # Access the UI here
  selector:
    app: frontend-web
