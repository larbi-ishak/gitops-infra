apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-web
  namespace: demo-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-web
  template:
    metadata:
      labels:
        app: frontend-web
    spec:
      containers:
      - name: frontend
        image: docker.io/larbizyoisco/frontend-web:latest  # Replace with your image
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: API_URL
          value: "http://backend-api:8000" # K8s internal DNS (change to external ingress URL if testing outside the cluster)
