apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: child-worker
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/larbi-ishak/gitops-infra.git'
    targetRevision: HEAD
    path: k8s-manifests
    directory:
      include: 'worker.yaml'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: demo-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
